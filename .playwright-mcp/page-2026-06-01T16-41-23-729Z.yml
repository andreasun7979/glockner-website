            - generic [ref=e51]:
              - paragraph [ref=e52]: Über das Kontaktformular und das Buchungs-Widget für ein kostenloses Klarheitsgespräch verarbeiten wir die von Ihnen eingegebenen Daten (Name, E-Mail-Adresse, optional Telefon, Nachricht/Anliegen, gewünschter Termin) zum Zweck der Anfragebearbeitung und Terminbestätigung.
              - paragraph [ref=e53]: "Lead-Speicherung: Die übermittelten Daten werden in unserer Lead-Datenbank bei der Supabase Inc., 970 Toa Payoh North #07-04, Singapore 318992, gespeichert. Es besteht ein Auftragsverarbeitungsvertrag. Speicherung der Server-Region: EU (Frankfurt)."
              - paragraph [ref=e54]: "Transaktions-E-Mail: Bestätigungen und interne Benachrichtigungen versenden wir über Resend, Inc., 2261 Market Street #5039, San Francisco, CA 94114, USA. Es besteht ein Auftragsverarbeitungsvertrag; der Anbieter ist EU-US-DPF-zertifiziert."
              - paragraph [ref=e55]: "Rechtsgrundlage: Art. 6 Abs. 1 lit. b DSGVO (Durchführung vorvertraglicher Maßnahmen auf Ihre Anfrage) sowie Art. 6 Abs. 1 lit. f DSGVO (berechtigtes Interesse an einer effizienten Bearbeitung Ihrer Anfrage)."
              - paragraph [ref=e56]: "Speicherdauer: bis zum endgültigen Abschluss Ihrer Anfrage, längstens jedoch bis zum Ablauf gesetzlicher Aufbewahrungs- pflichten (in der Regel 7 Jahre nach BAO)."
          - generic [ref=e57]:
            - heading "5. Cookies" [level=2] [ref=e58]
            - generic [ref=e59]:
              - paragraph [ref=e60]: Diese Website setzt nur technisch notwendige Cookies ein (z. B. zur Sicherung der Session-Funktionalität). Marketing- oder Tracking- Cookies kommen nicht zum Einsatz. Es ist daher kein Cookie-Banner eingebunden.
              - paragraph [ref=e61]: Sie können die Speicherung von Cookies jederzeit über die Einstellungen Ihres Browsers verhindern. In diesem Fall können einzelne Funktionen der Website eingeschränkt sein.
              - paragraph [ref=e62]: "Rechtsgrundlage: Art. 6 Abs. 1 lit. f DSGVO bzw. § 165 Abs. 3 TKG 2021 (technisch notwendige Speicherung)."
          - generic [ref=e63]:
            - heading "6. Content-Management (Sanity)" [level=2] [ref=e64]
            - paragraph [ref=e66]: Die redaktionellen Inhalte dieser Website werden mit Sanity (Sanity.io, c/o Sanity AS, Henrik Ibsens gate 100, 0255 Oslo, Norwegen) verwaltet. Sanity verarbeitet beim normalen Besuch unserer Website keine personenbezogenen Daten von Ihnen — die Inhalte werden serverseitig in unsere Website integriert ausgeliefert.
          - generic [ref=e67]:
            - heading "7. Empfänger / Weitergabe an Dritte" [level=2] [ref=e68]
            - paragraph [ref=e70]: Eine Weitergabe Ihrer personenbezogenen Daten erfolgt ausschließlich an die unter Punkt 3 und 4 genannten Auftragsverarbeiter (Vercel, Supabase, Resend) sowie an Behörden, soweit wir dazu gesetzlich verpflichtet sind. Ein Verkauf Ihrer Daten findet nicht statt.
          - generic [ref=e71]:
            - heading "8. Übermittlung in Drittländer" [level=2] [ref=e72]
            - paragraph [ref=e74]: Soweit Daten in Länder außerhalb des EWR übermittelt werden (USA), geschieht dies auf Basis von Angemessenheitsbeschlüssen der Europäischen Kommission (EU-US Data Privacy Framework) bzw. auf Basis von Standardvertragsklauseln nach Art. 46 Abs. 2 lit. c DSGVO.
          - generic [ref=e75]:
            - heading "9. Ihre Rechte als betroffene Person" [level=2] [ref=e76]
            - generic [ref=e77]:
