                - listitem [ref=e83]: Einschränkung der Verarbeitung (Art. 18 DSGVO)
                - listitem [ref=e84]: Datenübertragbarkeit (Art. 20 DSGVO)
                - listitem [ref=e85]: Widerruf erteilter Einwilligungen (Art. 7 Abs. 3 DSGVO)
                - listitem [ref=e86]: Widerspruch gegen Verarbeitungen auf Grundlage berechtigter Interessen (Art. 21 DSGVO)
                - listitem [ref=e87]:
