- generic [ref=e2]: "{\"items\":[{\"id\":\"c4df83ae-d487-400e-ac51-9203a5674b98\",\"section\":\"A · Brand & Inhalt\",\"source\":\"Agent\",\"title_de\":\"A1 — Falsche Klagenfurt-Adresse im Footer\",\"title_en\":\"A1 — Wrong Klagenfurt address in footer\",\"body_de\":\"Severity: Critical | Viewport: Desktop + Mobile | URL: alle Seiten (Footer). Footer zeigt aktuell „Sankt Ruprechter Straße 90, 9020 Klagenfurt\\\". Korrekt laut Brand-Quelle: Haraldweg 26/10, 9020 Klagenfurt. Fix: Adresse in src/components/Footer.tsx ersetzen, Repo nach „Sankt Ruprechter\\\" greppen (Impressum, schema.org, Sanity-Seed).\",\"body_en\":\"Severity: Critical | Viewport: Desktop + Mobile | URL: all pages (footer). Currently shows „Sankt Ruprechter Straße 90, 9020 Klagenfurt\\\". Correct: Haraldweg 26/10, 9020 Klagenfurt. Fix: replace in src/components/Footer.tsx; grep repo for „Sankt Ruprechter\\\" (Impressum, schema.org, Sanity seeds).\",\"status\":\"open\",\"order_idx\":100,\"created_at\":\"2026-05-07T21:55:03.432727+00:00\",\"updated_at\":\"2026-05-07T21:55:03.432727+00:00\"},{\"id\":\"a92fcfc8-0d15-443f-86cc-75228e79ccba\",\"section\":\"A · Brand & Inhalt\",\"source\":\"Agent\",\"title_de\":\"A2 — Footer-Brand-Inkonsistenz: AI-Logo + Digital-Copyright\",\"title_en\":\"A2 — Footer brand inconsistency: AI logo + Digital copyright\",\"body_de\":\"Severity: Critical | Viewport: Desktop + Mobile | URL: alle Seiten. Footer zeigt großes „GLOCKNER AI\\\"-Logo, darunter „© 2026 Glockner Digital\\\". Zwei Brands ohne Erklärung. Fix: Logo bleibt „Glockner AI\\\", Copyright erweitern auf „© 2026 Glockner Digital — Marken: Glockner AI, Glockner Digital\\\". Datei: src/components/Footer.tsx.\",\"body_en\":\"Severity: Critical | Viewport: Desktop + Mobile | URL: all pages. Footer shows large \\\"GLOCKNER AI\\\" logo with \\\"© 2026 Glockner Digital\\\" copyright underneath. Fix: keep AI logo, expand copyright to \\\"© 2026 Glockner Digital — brands: Glockner AI, Glockner Digital\\\". File: src/components/Footer.tsx.\",\"status\":\"open\",\"order_idx\":200,\"created_at\":\"2026-05-07T21:55:03.432727+00:00\",\"updated_at\":\"2026-05-07T21:55:03.432727+00:00\"},{\"id\":\"be7d932c-f307-456e-9eed-0e786cb80961\",\"section\":\"A · Brand & Inhalt\",\"source\":\"Agent\",\"title_de\":\"A3 — Hexagram (Davidstern) als Hero-Ornament auf /digital/*\",\"title_en\":\"A3 — Star-of-David hero ornament on /digital/*\",\"body_de\":\"Severity: Critical | Viewport: Desktop + Mobile | URL: /digital/{ecommerce,gewerbe,gesundheit}. Über jedem Hero ein 6-zackiger Stern (Davidstern). Im AT-B2B-Kontext kulturell/religiös vorbelastet, besonders auf Apotheken-Seite. Fix: ersetzen durch VesicaSeal (E-Commerce), Triangle/Pyramid (Gewerbe), FlowerOfLife (Gesundheit). Dateien: src/app/digital/*/page.tsx.\",\"body_en\":\"Severity: Critical | Viewport: Desktop + Mobile | URL: /digital/{ecommerce,gewerbe,gesundheit}. A six-pointed star (Star of David) sits above each hero. Religiously loaded in the Austrian context, especially on the pharmacy page. Fix: replace with VesicaSeal (e-commerce), Triangle/Pyramid (trades), FlowerOfLife (health). Files: src/app/digital/*/page.tsx.\",\"status\":\"open\",\"order_idx\":300,\"created_at\":\"2026-05-07T21:55:03.432727+00:00\",\"updated_at\":\"2026-05-07T21:55:03.432727+00:00\"},{\"id\":\"2862ae0a-19d8-42b2-8cfd-21c642bb2eb1\",\"section\":\"B · UX-Funktional\",\"source\":\"Agent\",\"title_de\":\"B1 — „Beratung sichern\\\" wrapt im Mobile-Header\",\"title_en\":\"B1 — \\\"Beratung sichern\\\" wraps on mobile header\",\"body_de\":\"Severity: Important | Viewport: Mobile only | URL: alle Seiten | Selektor: header a[href*=\\\"termin\\\"]. Auf 390×844 wickelt der CTA auf zwei Zeilen, Button wirkt zerquetscht. Fix-Optionen: (1) Mobile-Label kürzen → „Termin\\\" oder „Beratung →\\\"; (2) whitespace-nowrap und px-2.5 py-1; (3) „Kontakt\\\"-Link <420px ausblenden. Datei: src/components/Header.tsx (~Z. 138–152).\",\"body_en\":\"Severity: Important | Viewport: Mobile only | URL: all pages | Selector: header a[href*=\\\"termin\\\"]. At 390×844 the CTA wraps to two lines, the button looks squashed. Fix options: (1) shorten mobile label to \\\"Termin\\\" or \\\"Beratung →\\\"; (2) whitespace-nowrap with px-2.5 py-1; (3) hide \\\"Kontakt\\\" below 420px. File: src/components/Header.tsx (~lines 138–152).\",\"status\":\"open\",\"order_idx\":400,\"created_at\":\"2026-05-07T21:55:36.8619+00:00\",\"updated_at\":\"2026-05-07T21:55:36.8619+00:00\"},{\"id\":\"0beed57e-9ab0-40d3-8503-58de7c278ca8\",\"section\":\"B · UX-Funktional\",\"source\":\"Agent\",\"title_de\":\"B2 — Förderpaket III bricht das Preisschema\",\"title_en\":\"B2 — Funding tier III breaks the pricing pattern\",\"body_de\":\"Severity: Important | Viewport: Desktop + Mobile | URL: /leistungen-lux3#foerderung. Pakete I+II zeigen Strikethrough + Endpreis nach Förderung. Paket III zeigt „BIS ZU € 6.000 Förderung möglich\\\" — die 6k sind hier der Förderbetrag, nicht der Endpreis. Fix: Schema vereinheitlichen → „ab € 6.000 nach WKO-Förderung\\\" mit Strike. Datei: src/app/leistungen-lux3/page.tsx (Förderpakete-Array).\",\"body_en\":\"Severity: Important | Viewport: Desktop + Mobile | URL: /leistungen-lux3#foerderung. Tiers I+II show strike + after-funding price. Tier III shows \\\"UP TO €6,000 funding available\\\" — the 6k is the funding, not the price. Fix: align to same schema → \\\"from €6,000 after WKO funding\\\" with strike. File: src/app/leistungen-lux3/page.tsx (funding tiers array).\",\"status\":\"open\",\"order_idx\":500,\"created_at\":\"2026-05-07T21:55:36.8619+00:00\",\"updated_at\":\"2026-05-07T21:55:36.8619+00:00\"},{\"id\":\"f42091dc-b734-4fc4-b938-a61e9dbb33ee\",\"section\":\"B · UX-Funktional\",\"source\":\"Agent\",\"title_de\":\"B3 — Andreas-Foto-Caption über goldenem Kreis schlecht lesbar\",\"title_en\":\"B3 — Andreas photo caption poorly legible on gold circle\",\"body_de\":\"Severity: Important | Viewport: Desktop + Mobile | URL: /leistungen-lux3#andreas. Weiße Caption auf hellem Gold = niedriger Kontrast; Eyebrow „GRÜNDER · GLOCKNER AI\\\" ebenfalls schwer lesbar. Fix: Bottom-Gradient-Overlay (transparent → rgba(2,6,23,0.9)), Caption darauf, Eyebrow auf text-white/70. Datei: src/app/leistungen-lux3/page.tsx (Andreas-Section).\",\"body_en\":\"Severity: Important | Viewport: Desktop + Mobile | URL: /leistungen-lux3#andreas. White caption on light gold = low contrast; \\\"FOUNDER · GLOCKNER AI\\\" eyebrow also hard to read. Fix: bottom gradient overlay (transparent → rgba(2,6,23,0.9)), caption on top, eyebrow at text-white/70. File: src/app/leistungen-lux3/page.tsx (Andreas section).\",\"status\":\"open\",\"order_idx\":600,\"created_at\":\"2026-05-07T21:55:36.8619+00:00\",\"updated_at\":\"2026-05-07T21:55:36.8619+00:00\"},{\"id\":\"6faf7a0d-dd85-4d39-9730-a9ba6d429d1d\",\"section\":\"B · UX-Funktional\",\"source\":\"Agent\",\"title_de\":\"B4 — Granat-Theme dormant: /digital/* visuell identisch zu AI-Seiten\",\"title_en\":\"B4 — Granat theme dormant: /digital/* visually identical to AI pages\",\"body_de\":\"Severity: Important | Viewport: Desktop + Mobile | URL: /digital/*. Glockner Digital wurde mit Granat-Theme angelegt (CSS-Klassen granat-text, granat-rule, .theme-granat scope in globals.css Z. 308–314). Aktuell nirgends gesetzt — alle Digital-Seiten sind Aurum-Gold wie AI. Fix: theme-granat-Klasse auf den Wrapper in src/app/digital/*/page.tsx setzen; Header-CTA-Gradient bei pathname.startsWith(\\\"/digital\\\") auf Granat schalten. Dateien: src/app/digital/*/page.tsx, src/components/Header.tsx.\",\"body_en\":\"Severity: Important | Viewport: Desktop + Mobile | URL: /digital/*. Glockner Digital was branded with a Granat theme (granat-text, granat-rule, .theme-granat scope in globals.css L308–314). Currently never applied — all Digital pages render in Aurum gold. Fix: add theme-granat className to the wrapper in src/app/digital/*/page.tsx; switch header CTA gradient when pathname.startsWith(\\\"/digital\\\"). Files: src/app/digital/*/page.tsx, src/components/Header.tsx.\",\"status\":\"open\",\"order_idx\":700,\"created_at\":\"2026-05-07T21:55:36.8619+00:00\",\"updated_at\":\"2026-05-07T21:55:36.8619+00:00\"},{\"id\":\"ef937035-156c-4b34-9822-ddb71befef38\",\"section\":\"C · Layout & Polish\",\"source\":\"Agent\",\"title_de\":\"C1 — Hero „Money Making AI.\\\" stackt aggressiv auf Mobile\",\"title_en\":\"C1 — Hero \\\"Money Making AI.\\\" stacks aggressively on mobile\",\"body_de\":\"Severity: Polish | Viewport: Mobile only | URL: / (Lux preview = /leistungen-lux3). Auf 390px bricht die Hero-Headline auf 3 Zeilen, „AI.\\\" steht orphaned. Fix: Schriftgröße ~10% reduzieren (text-[3.25rem] statt 3.75rem) ODER expliziter <br> nach „Money Making\\\". Datei: src/app/leistungen-lux3/page.tsx Hero h1.\",\"body_en\":\"Severity: Polish | Viewport: Mobile only | URL: / (Lux preview = /leistungen-lux3). At 390px the hero breaks across 3 lines, \\\"AI.\\\" sits orphaned. Fix: reduce size ~10% (text-[3.25rem] vs 3.75rem) or insert explicit <br> after \\\"Money Making\\\". File: src/app/leistungen-lux3/page.tsx hero h1.\",\"status\":\"open\",\"order_idx\":800,\"created_at\":\"2026-05-07T21:56:07.177421+00:00\",\"updated_at\":\"2026-05-07T21:56:07.177421+00:00\"},{\"id\":\"798555c7-9e29-48c3-9f99-59d8045c2702\",\"section\":\"C · Layout & Polish\",\"source\":\"Agent\",\"title_de\":\"C2 — /digital/* Hero-Eyebrow auf 3 Zeilen statt einer\",\"title_en\":\"C2 — /digital/* hero eyebrow stacks across 3 lines\",\"body_de\":\"Severity: Polish | Viewport: Desktop | URL: /digital/{ecommerce,gewerbe,gesundheit}. „GLOCKNER DIGITAL\\\" → leere Zeile → „BERATUNG · E-COMMERCE\\\" wirkt wie zwei Eyebrows. Fix: zu einer Zeile mergen → „GLOCKNER DIGITAL · BERATUNG · E-COMMERCE\\\" mit Trenner. Datei: src/app/digital/*/page.tsx Hero-Block.\",\"body_en\":\"Severity: Polish | Viewport: Desktop | URL: /digital/{ecommerce,gewerbe,gesundheit}. \\\"GLOCKNER DIGITAL\\\" → empty line → \\\"BERATUNG · E-COMMERCE\\\" looks like two eyebrows. Fix: merge into one line \\\"GLOCKNER DIGITAL · BERATUNG · E-COMMERCE\\\" with thin separator. File: src/app/digital/*/page.tsx hero block.\",\"status\":\"open\",\"order_idx\":900,\"created_at\":\"2026-05-07T21:56:07.177421+00:00\",\"updated_at\":\"2026-05-07T21:56:07.177421+00:00\"},{\"id\":\"da0de4ec-d3da-4aa7-8417-2be8fb4228fa\",\"section\":\"C · Layout & Polish\",\"source\":\"Agent\",\"title_de\":\"C3 — Pricing-Card I: Strikethrough „€ 500\\\" optisch zu zart\",\"title_en\":\"C3 — Pricing card I: strikethrough \\\"€ 500\\\" too subtle\",\"body_de\":\"Severity: Polish | Viewport: Desktop | URL: /leistungen-lux3#foerderung. Strikethrough sehr klein, niedriger Kontrast — der „80 % Förderung\\\"-Effekt geht für Fly-by-Leser verloren. Fix: text-base text-aurum-soft/60, leichtes rotate(-4deg). Optional „−80%\\\"-Pill rechts daneben. Datei: src/app/leistungen-lux3/page.tsx (Förderpakete-Card).\",\"body_en\":\"Severity: Polish | Viewport: Desktop | URL: /leistungen-lux3#foerderung. Strikethrough is small with low contrast — fly-by readers miss the 80% punch. Fix: text-base text-aurum-soft/60, slight rotate(-4deg). Optional \\\"-80%\\\" pill alongside. File: src/app/leistungen-lux3/page.tsx (funding card).\",\"status\":\"open\",\"order_idx\":1000,\"created_at\":\"2026-05-07T21:56:07.177421+00:00\",\"updated_at\":\"2026-05-07T21:56:07.177421+00:00\"},{\"id\":\"d26c278a-0744-4b12-933c-04058ab0480f\",\"section\":\"C · Layout & Polish\",\"source\":\"Agent\",\"title_de\":\"C4 — Triquetra-Halo erreicht den Außenring nicht\",\"title_en\":\"C4 — Triquetra halo does not reach the outer ring\",\"body_de\":\"Severity: Polish | Viewport: Desktop | URL: / Hero. Halo-scale 1.55 erreicht die Triquetra-Außenringe nicht — Effekt wirkt isoliert. Fix: Halo-scale auf 1.85 ODER zweites Halo mit scale 2.4, opacity 0.15. Datei: src/app/globals.css Z. 260–268 (aurum-pulse-halo).\",\"body_en\":\"Severity: Polish | Viewport: Desktop | URL: / hero. Halo at scale 1.55 does not reach the triquetra rings — looks isolated. Fix: bump halo scale to 1.85 OR add a second halo at scale 2.4 / opacity 0.15. File: src/app/globals.css L260–268 (aurum-pulse-halo).\",\"status\":\"open\",\"order_idx\":1100,\"created_at\":\"2026-05-07T21:56:07.177421+00:00\",\"updated_at\":\"2026-05-07T21:56:07.177421+00:00\"},{\"id\":\"7d973973-7d03-4e93-93e2-4cb5ee173fa1\",\"section\":\"C · Layout & Polish\",\"source\":\"Agent\",\"title_de\":\"C5 — Footer-Mobile: AI / Digital ohne Trenner\",\"title_en\":\"C5 — Footer mobile: AI / Digital with no separator\",\"body_de\":\"Severity: Polish | Viewport: Mobile | URL: alle Seiten. Beide Listen-Gruppen rutschen direkt untereinander, Sub-Brand-Architektur geht verloren. Fix: aurum-rule oder mt-6 pt-6 border-t border-white/[0.06] zwischen den Gruppen. Datei: src/components/Footer.tsx.\",\"body_en\":\"Severity: Polish | Viewport: Mobile | URL: all pages. Both link groups stack directly — looks like one long list. Fix: aurum-rule or mt-6 pt-6 border-t border-white/[0.06] between groups. File: src/components/Footer.tsx.\",\"status\":\"open\",\"order_idx\":1200,\"created_at\":\"2026-05-07T21:56:35.546006+00:00\",\"updated_at\":\"2026-05-07T21:56:35.546006+00:00\"},{\"id\":\"10fc31da-dec9-4e33-8a2e-4957a81ed86b\",\"section\":\"C · Layout & Polish\",\"source\":\"Agent\",\"title_de\":\"C6 — Booking-Calendar: vergangene Tage nicht visuell disabled\",\"title_en\":\"C6 — Booking calendar: past days not visually disabled\",\"body_de\":\"Severity: Polish | Viewport: Desktop + Mobile | URL: /leistungen-lux3#termin. Wochenende ist ausgegraut, vergangene Werktage nicht — sehen klickbar aus, tun aber nichts. Fix: Vergangene Tage mit opacity-30 cursor-not-allowed pointer-events-none. Datei: vermutlich src/components/booking/Calendar.tsx.\",\"body_en\":\"Severity: Polish | Viewport: Desktop + Mobile | URL: /leistungen-lux3#termin. Weekends are greyed, past weekdays look clickable but do nothing. Fix: render past days with opacity-30 cursor-not-allowed pointer-events-none. File: presumably src/components/booking/Calendar.tsx.\",\"status\":\"open\",\"order_idx\":1300,\"created_at\":\"2026-05-07T21:56:35.546006+00:00\",\"updated_at\":\"2026-05-07T21:56:35.546006+00:00\"},{\"id\":\"cdea5f7e-b292-4b64-b384-a62ced93b0b9\",\"section\":\"C · Layout & Polish\",\"source\":\"Agent\",\"title_de\":\"C7 — ContactForm-Submit: Hover schwächer als Idle\",\"title_en\":\"C7 — ContactForm submit: hover weaker than idle\",\"body_de\":\"Severity: Polish | Viewport: Desktop | URL: Footer-Kontakt-Block | Selektor: button[type=\\\"submit\\\"]. Idle wirkt kontrastreicher als Hover. Fix: Hover-Gradient from-aurum-soft via-aurum-soft to-aurum (heller, gleichmäßiger), shadow-[0_8px_24px_-8px_rgba(201,168,106,0.6)]. Datei: src/components/ContactForm.tsx.\",\"body_en\":\"Severity: Polish | Viewport: Desktop | URL: footer contact block | Selector: button[type=\\\"submit\\\"]. Idle has more contrast than hover. Fix: hover gradient from-aurum-soft via-aurum-soft to-aurum (brighter, smoother), shadow-[0_8px_24px_-8px_rgba(201,168,106,0.6)]. File: src/components/ContactForm.tsx.\",\"status\":\"open\",\"order_idx\":1400,\"created_at\":\"2026-05-07T21:56:35.546006+00:00\",\"updated_at\":\"2026-05-07T21:56:35.546006+00:00\"},{\"id\":\"46f3cb4d-9c28-4206-9eb3-7027a8532898\",\"section\":\"D · SEO / Meta\",\"source\":\"Agent\",\"title_de\":\"D1 — noindex auf Production-Domain verifizieren\",\"title_en\":\"D1 — Verify noindex on production domain\",\"body_de\":\"Severity: Polish | Viewport: N/A (HTTP) | URL: https://test.glockner.ai. Lux-Preview-Subdomain liefert korrekt X-Robots-Tag noindex. Production NICHT verifiziert. Fix: curl -I https://test.glockner.ai/ — X-Robots-Tag darf NICHT noindex sein. Falls doch: Middleware-Default in src/middleware.ts ist zu breit, nur Lux-Host darf noindex. Datei: src/middleware.ts.\",\"body_en\":\"Severity: Polish | Viewport: N/A (HTTP) | URL: https://test.glockner.ai. Lux preview correctly serves X-Robots-Tag noindex. Production not verified. Fix: curl -I https://test.glockner.ai/ — X-Robots-Tag must NOT contain noindex. If it does, the middleware default in src/middleware.ts is too broad — only Lux host should be noindex. File: src/middleware.ts.\",\"status\":\"open\",\"order_idx\":1500,\"created_at\":\"2026-05-07T21:56:35.546006+00:00\",\"updated_at\":\"2026-05-07T21:56:35.546006+00:00\"},{\"id\":\"d3d3e96f-ca14-4320-8ace-5f1b480d18d7\",\"section\":\"B · UX-Funktional\",\"source\":\"Agent\",\"title_de\":\"B5 — Supabase-Projekt pausiert: Leads gehen still verloren\",\"title_en\":\"B5 — Supabase project paused: leads silently lost\",\"body_de\":\"Das Website-Supabase-Projekt kjschlicrafsdwwkxecm (glockner-website, Frankfurt) liegt auf dem Free-Tier und pausiert nach Inaktivität automatisch (status INACTIVE). Solange es pausiert ist, schlägt das Speichern von Kontaktformular-Leads in der leads-Tabelle still fehl — der Besucher sieht trotzdem die Erfolgsmeldung. Empfehlung: Projekt vor Go-Live aufwecken und auf einen bezahlten Plan heben ODER einen Healthcheck/Cron einrichten, der es wachhält. Zusätzlich im /api/contact-Handler bei Insert-Fehler eine Warnung loggen statt still durchlaufen.\",\"body_en\":\"The website Supabase project kjschlicrafsdwwkxecm (glockner-website, Frankfurt) is on the free tier and auto-pauses after inactivity (status INACTIVE). While paused, saving contact-form leads to the leads table silently fails — the visitor still sees the success message. Recommendation: wake the project before go-live and move it to a paid plan OR set up a healthcheck/cron to keep it alive. Also log a warning in the /api/contact handler on insert failure instead of passing silently.\",\"status\":\"open\",\"order_idx\":1600,\"created_at\":\"2026-05-16T15:50:16.793921+00:00\",\"updated_at\":\"2026-05-16T15:50:16.793921+00:00\"},{\"id\":\"c214cb60-138e-43fb-8cd7-092c6f201e9d\",\"section\":\"E · Backlog / Ideen\",\"source\":\"Agent\",\"title_de\":\"E1 — middleware.ts auf proxy.ts umbenennen (Next.js 16)\",\"title_en\":\"E1 — Rename middleware.ts to proxy.ts (Next.js 16)\",\"body_de\":\"Der Dev-Server meldet: „The middleware file convention is deprecated. Please use proxy instead.\\\" src/middleware.ts funktioniert noch, sollte aber fuer Next.js-16-Forward-Compatibility in src/proxy.ts umbenannt werden. Kein akuter Bug — vor dem naechsten Next-Update erledigen.\",\"body_en\":\"The dev server warns: \\\"The middleware file convention is deprecated. Please use proxy instead.\\\" src/middleware.ts still works but should be renamed to src/proxy.ts for Next.js 16 forward compatibility. Not an urgent bug — do it before the next Next.js update.\",\"status\":\"open\",\"order_idx\":1700,\"created_at\":\"2026-05-16T15:50:16.793921+00:00\",\"updated_at\":\"2026-05-16T15:50:16.793921+00:00\"},{\"id\":\"09e3257c-b418-4195-b361-ab42f7983263\",\"section\":\"E · Backlog / Ideen\",\"source\":\"Agent\",\"title_de\":\"E2 — Vier parallele Leistungen-Seiten aufraeumen\",\"title_en\":\"E2 — Clean up four parallel services pages\",\"body_de\":\"Es existieren vier parallele Leistungen-Seiten: /leistungen (alt), /leistungen-lux, /leistungen-lux2 und /leistungen-lux3 (aktuell live). Die Service-Card-Arrays sind in allen vier Dateien dupliziert — Copy-Aenderungen muessen vierfach synchron gehalten werden. Empfehlung: nicht mehr benoetigte Varianten loeschen und die Card-Daten in ein gemeinsames Modul auslagern.\",\"body_en\":\"There are four parallel services pages: /leistungen (old), /leistungen-lux, /leistungen-lux2 and /leistungen-lux3 (currently live). The service-card arrays are duplicated across all four files — copy changes must be kept in sync fourfold. Recommendation: delete the unused variants and extract the card data into a shared module.\",\"status\":\"open\",\"order_idx\":1800,\"created_at\":\"2026-05-16T15:50:16.793921+00:00\",\"updated_at\":\"2026-05-16T15:50:16.793921+00:00\"},{\"id\":\"f7b2c308-a840-47ab-9b4a-4a73636b30bc\",\"section\":\"F · Recht & DSGVO\",\"source\":\"Agent\",\"title_de\":\"F1 — Google-Fonts selbst hosten (DSGVO-Risiko)\",\"title_en\":\"F1 — Self-host Google Fonts (GDPR risk)\",\"body_de\":\"Die Schriften (Montserrat, DM Sans, Fraunces) werden per <link> vom Google-Fonts-CDN geladen. Dynamisches Google-Fonts-Embedding ist ein dokumentiertes DSGVO-Risiko (LG Muenchen I, 3 O 17493/20 — Weitergabe der Besucher-IP an Google ohne Einwilligung). Empfehlung: Font-Dateien selbst hosten (public/fonts/ + next/font/local) und den CDN-Link in layout.tsx entfernen.\",\"body_en\":\"Fonts (Montserrat, DM Sans, Fraunces) are loaded via a <link> from the Google Fonts CDN. Dynamic Google Fonts embedding is a documented GDPR risk (Munich Regional Court I, 3 O 17493/20 — passing the visitor IP to Google without consent). Recommendation: self-host the font files (public/fonts/ + next/font/local) and remove the CDN link in layout.tsx.\",\"status\":\"open\",\"order_idx\":1900,\"created_at\":\"2026-05-16T15:50:16.793921+00:00\",\"updated_at\":\"2026-05-16T15:50:16.793921+00:00\"},{\"id\":\"cc079d7a-55e1-4e38-8531-061cafd3aaf1\",\"section\":\"F · Recht & DSGVO\",\"source\":\"Agent\",\"title_de\":\"F2 — Resend-Versanddomain glocknerdigital.at verifizieren\",\"title_en\":\"F2 — Verify Resend sending domain glocknerdigital.at\",\"body_de\":\"Solange glocknerdigital.at in Resend nicht als Versanddomain verifiziert ist, versenden /api/booking und /api/contact von onboarding@resend.dev. Das wirkt unserioes und landet eher im Spam. Empfehlung: Domain in Resend verifizieren (SPF/DKIM), dann RESEND_FROM_EMAIL auf eine glocknerdigital.at-Adresse setzen. Hinweis: Auf dem Free-Tier stellt Resend bis zur Verifizierung nur an die Account-eigene Adresse zu — vor Go-Live testen.\",\"body_en\":\"Until glocknerdigital.at is verified as a sending domain in Resend, /api/booking and /api/contact send from onboarding@resend.dev. This looks untrustworthy and is more likely to land in spam. Recommendation: verify the domain in Resend (SPF/DKIM), then set RESEND_FROM_EMAIL to a glocknerdigital.at address. Note: on the free tier Resend only delivers to the account-owner address until verified — test before go-live.\",\"status\":\"open\",\"order_idx\":2000,\"created_at\":\"2026-05-16T15:50:16.793921+00:00\",\"updated_at\":\"2026-05-16T15:50:16.793921+00:00\"}],\"commentsByItem\":{},\"sections\":[{\"name\":\"A · Brand & Inhalt\",\"order_idx\":100,\"created_at\":\"2026-05-07T21:51:43.578041+00:00\"},{\"name\":\"B · UX-Funktional\",\"order_idx\":200,\"created_at\":\"2026-05-07T21:51:43.578041+00:00\"},{\"name\":\"C · Layout & Polish\",\"order_idx\":300,\"created_at\":\"2026-05-07T21:51:43.578041+00:00\"},{\"name\":\"D · SEO / Meta\",\"order_idx\":400,\"created_at\":\"2026-05-07T21:51:43.578041+00:00\"},{\"name\":\"E · Backlog / Ideen\",\"order_idx\":500,\"created_at\":\"2026-05-07T21:51:43.578041+00:00\"},{\"name\":\"F · Recht & DSGVO\",\"order_idx\":600,\"created_at\":\"2026-05-16T15:50:16.793921+00:00\"}]}"